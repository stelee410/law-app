services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: law_ai
      POSTGRES_USER: law_ai
      POSTGRES_PASSWORD: law_ai_password
    ports:
      - "5432:5432"
    volumes:
      - law_ai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_ai -d law_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api
    environment:
      PORT: 4000
      DATABASE_URL: postgres://law_ai:law_ai_password@db:5432/law_ai
      MOCK_OTP_CODE: 123456
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      target: web
      args:
        VITE_API_URL: ""
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  law_ai_pgdata:
