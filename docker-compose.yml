services:
  api:
    build:
      context: .
      target: api
    environment:
      APP_ENV: development
      PROJECT_NAME: law-app
      API_V1_STR: /api/v1
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:8080"
      MOCK_OTP_CODE: 123456
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: web
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"
